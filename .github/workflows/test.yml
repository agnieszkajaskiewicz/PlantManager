name: Run Tests

on:
  push:
  pull_request:
    branches: [ master ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Run backend tests
      run: mvn test
      working-directory: ./PlantManager
      
    - name: Upload backend test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-reports
        path: PlantManager/target/surefire-reports/
        retention-days: 30

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './plantmanager-react/package-lock.json'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: ./plantmanager-react
      env:
        NODE_ENV: development
      
    - name: Run frontend tests
      run: npm run coverage
      working-directory: ./plantmanager-react
      env:
        NODE_ENV: test
      
    - name: Upload frontend test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-test-reports
        path: plantmanager-react/coverage/
        retention-days: 30
