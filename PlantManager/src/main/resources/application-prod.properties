# Production profile - MySQL Database with Liquibase
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Validate only - Liquibase handles schema
spring.jpa.hibernate.ddl-auto=validate

# Liquibase configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Disable H2 console
spring.h2.console.enabled=false

# Don't show SQL in production
spring.jpa.show-sql=false

# Frontend URL from environment
app.frontend.url=${FRONTEND_URL}

# Security - don't expose stack traces
server.error.include-message=never
server.error.include-stacktrace=never
