spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.application.name=Plant Manager

spring.messages.basename=validation

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions = true

# Default profile uses H2 for development
spring.profiles.active=dev

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:plantmanager.reminder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password-here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mail templates
spring.mail.templates.path=templates

#Actuator endpoints
management.endpoints.web.exposure.include=health

app.frontend.url=http://localhost:3000
