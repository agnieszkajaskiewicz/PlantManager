# Docker profile - MySQL Database
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:plantmanager}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:plantmanager}
spring.datasource.password=${DB_PASSWORD:plantmanager}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console
spring.h2.console.enabled=false

# Show SQL for debugging
spring.jpa.show-sql=true
