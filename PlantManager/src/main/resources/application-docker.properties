# Docker profile - PostgreSQL Database (same as prod for consistency)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/plantmanager}
spring.datasource.username=${DB_USER:plantmanager}
spring.datasource.password=${DB_PASSWORD:plantmanager}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Validate only - Liquibase handles schema
spring.jpa.hibernate.ddl-auto=validate

# Disable H2 console
spring.h2.console.enabled=false

# Don't show SQL in production
spring.jpa.show-sql=false
