app = 'plantmanager-frontend'
primary_region = 'fra'

[build]
  dockerfile = './Dockerfile'
  [build.args]
    VITE_API_BASE_URL = "https://plantmanager-backend.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1